name: 'Bug: Relatório de bug'
description: Reporte de bug ou comportamento inesperado no Coin.
title: 'bug: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Preencha as informações do bug.

  - type: textarea
    id: bug_description
    attributes:
      label: 'Descrição do Bug'
      description: Descrição clara e objetiva do bug.
    validations:
      required: true

  - type: textarea
    id: current_behavior_description
    attributes:
      label: 'Comportamento Atual'
      description: Descrição clara e objetiva do comportamento atual.
    validations:
      required: true

  - type: textarea
    id: expected_behavior_description
    attributes:
      label: 'Comportamento Esperado'
      description: Descrição clara e objetiva do comportamento esperado.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: 'Passos para Reproduzir o bug'
      description: Passo a passo para reproduzir o bug.
      placeholder: |
        1. Vá para '...'
        2. Clique em '...'
        3. Role até '...'
        4. Veja o erro
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 'Evidências'
      description: Prints, logs ou gravações de tela com exemplos do bug.
    validations:
      required: false